<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="GraphRAG WASM — build and query knowledge graphs directly in your browser. WebGPU embeddings, WebLLM inference (Qwen3), pure Rust vector search, IndexedDB persistence. No server required." />
    <meta name="color-scheme" content="light" />
    <title>Chat — graphrag.rs</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link data-trunk rel="css" href="tailwind.css" />

    <!-- ONNX Runtime Web for GPU Embeddings (200KB from CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js" defer></script>
    <script>
        window.addEventListener('load', () => {
            if (window.ort) {
                try {
                    window.ort.env.wasm.proxy = true;
                    window.ort.env.wasm.numThreads = 1;
                } catch (e) {
                    console.warn("ORT proxy mode unavailable:", e);
                }
                console.log("✅ ONNX Runtime Web loaded (proxy worker enabled)");
                window.onnxReady = true;
            } else {
                console.warn("⚠️  ONNX Runtime Web not available");
                window.onnxReady = false;
            }
        });
    </script>

    <!-- WebLLM Integration for GPU-Accelerated LLM (main-thread API + worker engine) -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
        try {
            window.webllmWorker = new Worker(
                new URL("./webllm-worker.js", import.meta.url),
                { type: "module" }
            );
            console.log("✅ WebLLM loaded (worker engine ready)");
        } catch (e) {
            console.warn("WebLLM worker spawn failed, falling back to main thread:", e);
            window.webllmWorker = null;
        }
    </script>

    <link data-trunk rel="copy-file" href="webllm-worker.js" />
    <link data-trunk rel="copy-file" href="tokenizer.json" />
    <link data-trunk rel="copy-dir" href="models" />
    <link data-trunk rel="copy-file" href="Symposium.txt" />

    <link data-trunk rel="rust" data-wasm-opt="z" data-weak-refs data-bin="graphrag-wasm" data-cargo-features="hydrate" />
</head>
<body></body>
</html>
